// SPDX-License-Identifier: Apache-2.0
//
// Implementation-defined administrative surface of the rabi control plane.
// This is deliberately NOT part of the vendored Tangle spec: the spec's
// client API covers jobs/targets/usage and calls tenancy administration
// "RFC territory" — flagged as a SPEC QUESTION in docs/decisions.md D-033.
// Served over gRPC only (no REST mapping); qctl is the client.

syntax = "proto3";

package rabi.admin.v1alpha1;

import "google/protobuf/timestamp.proto";

service AdminService {
  // WhoAmI echoes the authenticated principal — the "did my login work" call.
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse);
  // CreateToken mints a per-project API token. The plaintext is returned
  // exactly once and stored only as a hash.
  rpc CreateToken(CreateTokenRequest) returns (CreateTokenResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  // RevokeToken invalidates a token immediately; rotation = create + revoke.
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // Project lifecycle (M2). Projects are keyed by the exact tenant string
  // the spec API speaks; org/name are derived display fields.
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  // ArchiveProject stops new submissions; history and running jobs remain.
  rpc ArchiveProject(ArchiveProjectRequest) returns (ArchiveProjectResponse);
  // SetQuota sets a per-unit native-unit limit; negative limit removes it.
  rpc SetQuota(SetQuotaRequest) returns (SetQuotaResponse);
  rpc ListQuotas(ListQuotasRequest) returns (ListQuotasResponse);

  // ExportLedger returns raw immutable usage rows in append order — the
  // deterministic input to site-side normalization (M3). Project-scoped
  // tokens may export only their own project.
  rpc ExportLedger(ExportLedgerRequest) returns (ExportLedgerResponse);
}

message WhoAmIRequest {}

message WhoAmIResponse {
  string subject = 1;
  string name = 2;
  string role = 3;
  string principal_type = 4;  // oidc | token | bootstrap
  string project = 5;         // token scope; empty = unscoped
}

message TokenInfo {
  string id = 1;
  string name = 2;
  string project = 3;
  string role = 4;
  string created_by = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp last_used_at = 7;  // unset = never used
  google.protobuf.Timestamp revoked_at = 8;    // unset = active
}

message CreateTokenRequest {
  string name = 1;     // human label, e.g. "ci-bot"
  string project = 2;  // tenant/project the token is scoped to
  string role = 3;     // viewer | member | operator | admin
}

message CreateTokenResponse {
  string token = 1;  // plaintext; never retrievable again
  TokenInfo info = 2;
}

message ListTokensRequest {
  string project = 1;  // empty = all projects (operator/admin view)
}

message ListTokensResponse {
  repeated TokenInfo tokens = 1;
}

message RevokeTokenRequest {
  string id = 1;
}

message RevokeTokenResponse {
  bool found = 1;
}

message Project {
  string tenant = 1;  // exact wire string, e.g. "acme/qa"
  string org = 2;
  string name = 3;
  int32 weight = 4;   // fair-share weight, >= 1
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp archived_at = 6;  // unset = active
}

message CreateProjectRequest {
  string tenant = 1;
  int32 weight = 2;  // 0 = default (1)
}

message ListProjectsRequest {
  bool include_archived = 1;
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message ArchiveProjectRequest {
  string tenant = 1;
}

message ArchiveProjectResponse {
  bool found = 1;
}

message Quota {
  string tenant = 1;
  string unit = 2;   // native unit, e.g. "shots"
  double limit = 3;
}

message SetQuotaRequest {
  string tenant = 1;
  string unit = 2;
  double limit = 3;  // negative removes the quota
}

message SetQuotaResponse {}

message ListQuotasRequest {
  string tenant = 1;  // empty = all projects
}

message ListQuotasResponse {
  repeated Quota quotas = 1;
}

message LedgerEntry {
  int64 id = 1;        // append-order id
  string job_id = 2;
  string task_id = 3;
  string tenant = 4;
  string target = 5;
  string unit = 6;     // native unit
  double amount = 7;
}

message ExportLedgerRequest {
  string tenant = 1;  // empty = all projects (unscoped principals only)
}

message ExportLedgerResponse {
  repeated LedgerEntry entries = 1;
}
