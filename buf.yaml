# SPDX-License-Identifier: Apache-2.0
version: v2
modules:
  - path: spec/proto
lint:
  use:
    - STANDARD
  # The vendored spec (which we never edit — mvp-build-plan.md §2) uses compact
  # request/response types (TargetRef, TaskRef, ...) and unprefixed enum values.
  # These rules are relaxed to match the spec as published; flagged as a spec
  # question in docs/decisions.md D-003.
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - ENUM_VALUE_PREFIX
breaking:
  use:
    - FILE
