# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rabi.fullname" . }}-auth
  labels: {{- include "rabi.labels" . | nindent 4 }}
type: Opaque
stringData:
  bootstrapToken: {{ .Values.auth.bootstrapToken | quote }}
  databaseUrl: {{ include "rabi.dbUrl" . | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabi.fullname" . }}
  labels: {{- include "rabi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: rabi
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: 9090
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rabi.fullname" . }}
  labels: {{- include "rabi.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabi
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabi
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: rabi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RABI_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabi.fullname" . }}-auth
                  key: databaseUrl
            - name: RABI_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabi.fullname" . }}-auth
                  key: bootstrapToken
            - name: RABI_GRPC_ADDR
              value: ":9090"
            - name: RABI_HTTP_ADDR
              value: ":8080"
            - name: RABI_POLICY
              value: {{ .Values.policy | quote }}
            - name: RABI_AUTO_MIGRATE
              value: {{ .Values.autoMigrate | quote }}
            {{- if .Values.adapterAer.enabled }}
            - name: RABI_ADAPTERS
              value: "sim=localhost:50051"
            {{- end }}
            {{- with .Values.reconcileEvery }}
            - name: RABI_RECONCILE_EVERY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.oidc.issuer }}
            - name: RABI_OIDC_ISSUER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.oidc.clientId }}
            - name: RABI_OIDC_CLIENT_ID
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.oidc.groupsClaim }}
            - name: RABI_OIDC_GROUPS_CLAIM
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.oidc.groupRoles }}
            - name: RABI_OIDC_GROUP_ROLES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.oidc.defaultRole }}
            - name: RABI_OIDC_DEFAULT_ROLE
              value: {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: 9090
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 60
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.adapterAer.enabled }}
        - name: adapter-aer
          image: "{{ .Values.adapterAer.image.repository }}:{{ .Values.adapterAer.image.tag }}"
          imagePullPolicy: {{ .Values.adapterAer.image.pullPolicy }}
          args: ["--config", "config/replay.yaml", "--listen", "[::]:50051"]
          env:
            - name: RABI_SIM_ACCEL
              value: {{ .Values.adapterAer.simAccel | quote }}
          ports:
            - containerPort: 50051
        {{- end }}
