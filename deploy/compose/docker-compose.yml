#
# Artifact A: the five-minute demo stack. M0 boots rabi + Postgres only;
# replay adapters join in M2–M7.
name: rabi

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rabi
      POSTGRES_PASSWORD: rabi
      POSTGRES_DB: rabi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabi -d rabi"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  adapter-aer:
    build:
      context: ../..
      dockerfile: adapters/aer/Dockerfile
    command: ["--config", "config/replay.yaml", "--listen", "[::]:50051"]
    environment:
      # 1 wall second = 10 sim minutes: a demo session spans days of drift.
      RABI_SIM_ACCEL: ${RABI_SIM_ACCEL:-600}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 50051), 2).close()"]
      interval: 3s
      timeout: 5s
      retries: 30

  # IBM Quantum adapter — feature-flagged OFF by default. Enable with:
  #   IBM_TOKEN=... RABI_ADAPTERS_EXTRA=",ibm=adapter-ibm:50052" \
  #     docker compose --profile ibm up -d
  # Open-plan queue times can be hours; see docs/quickstart.md.
  adapter-ibm:
    profiles: ["ibm"]
    build:
      context: ../..
      dockerfile: adapters/ibm/Dockerfile
    command: ["--listen", "[::]:50052"]
    environment:
      IBM_TOKEN: ${IBM_TOKEN:-}
      IBM_BACKENDS: ${IBM_BACKENDS:-}

  # M10 mixed-fleet members. Enable with --profile mixed (cassette cloud +
  # CPU-device sim twin, CI-safe) or --profile gpu (real cuQuantum device;
  # needs the NVIDIA container runtime and RABI_GPU_CONFIG=gpu-sim.yaml).
  adapter-iqm:
    profiles: ["mixed"]
    build:
      context: ../..
      dockerfile: adapters/iqm/Dockerfile
    command: ["--cassette", "--listen", "[::]:50055"]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 50055), 2).close()"]
      interval: 3s
      timeout: 5s
      retries: 30

  adapter-gpu:
    profiles: ["mixed", "gpu"]
    build:
      context: ../..
      dockerfile: adapters/aer/Dockerfile
    command: ["--config", "config/${RABI_GPU_CONFIG:-gpu-sim-cpu.yaml}", "--listen", "[::]:50056"]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 50056), 2).close()"]
      interval: 3s
      timeout: 5s
      retries: 30

  # M12 observability profile: prometheus scraping /metrics + grafana with
  # the dashboards-as-code under deploy/observability/dashboards.
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.53.0
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9091:9090"]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/rabi.yml:ro
      - ../observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/rabi.yml:ro
      - ../observability/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]

  rabi:
    build:
      context: ../..
    environment:
      RABI_BOOTSTRAP_TOKEN: ${RABI_BOOTSTRAP_TOKEN:-dev-key}
      RABI_DB_URL: postgres://rabi:rabi@postgres:5432/rabi?sslmode=disable
      RABI_GRPC_ADDR: ":9090"
      RABI_HTTP_ADDR: ":8080"
      RABI_ADAPTERS: "sim=adapter-aer:50051${RABI_ADAPTERS_EXTRA:-}"
      RABI_POLICY: ${RABI_POLICY:-calib-aware/v0}
      RABI_RECONCILE_EVERY: ${RABI_RECONCILE_EVERY:-}
      RABI_PROBE_EVERY: ${RABI_PROBE_EVERY:-15m}
    ports:
      - "9090:9090"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      adapter-aer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
