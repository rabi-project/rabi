# SPDX-License-Identifier: Apache-2.0
# Nightly: full e2e smoke, IBM adapter offline tests, and — only when the
# repository holds an IBM_TOKEN secret — one live Bell job on a real backend
# (T7.ibm-flag). Without the secret the live path is provably dormant: the
# job is skipped and the compose profile keeps the adapter out of the stack.
name: nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: compose up
        run: make compose-up
      - name: full smoke ladder
        run: |
          ./hack/smoke-m0.sh
          ./hack/smoke-m1.sh
          ./hack/smoke-m2.sh
      - name: seeded demo mix settles into the full state taxonomy
        run: ./hack/smoke-m7.sh
      - name: compose down
        if: always()
        run: make compose-down

  ibm-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: IBM adapter tests (local mode, tokenless)
        run: cd adapters/ibm && uv run --extra dev pytest -q

  ibm-live:
    runs-on: ubuntu-latest
    environment: ibm-quantum
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: live Bell on a real backend (skips without token)
        env:
          IBM_TOKEN: ${{ secrets.IBM_TOKEN }}
          IBM_INSTANCE: ${{ secrets.QRMI_SERVICE_CRN }}
          IBM_BACKEND: ${{ vars.IBM_BACKEND }}
        run: |
          if [ -z "$IBM_TOKEN" ]; then
            echo "IBM_TOKEN not set; skipping live Bell (dormant by design)"
            exit 0
          fi
          cd adapters/ibm && uv run python scripts/live_bell.py

  # Live QRMI certification: needs provider credentials in the qrmi-live
  # environment (QRMI reads its .env convention; see adapters/qrmi). Until
  # an org admin configures them, this job skips — provably dormant, like
  # ibm-live above.
  qrmi-live:
    runs-on: ubuntu-latest
    environment: qrmi-live
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: astral-sh/setup-uv@v5
      - name: live certification (skips without credentials)
        env:
          QRMI_RESOURCE: ${{ secrets.QRMI_RESOURCE }}
          # IBM_TOKEN is the IBM Cloud IAM API key (new quantum platform) —
          # shared with the ibm adapter; QRMI_SERVICE_CRN is the Qiskit
          # Runtime instance CRN. The .env QRMI reads is assembled here, so
          # the key is stored exactly once.
          IBM_TOKEN: ${{ secrets.IBM_TOKEN }}
          QRMI_SERVICE_CRN: ${{ secrets.QRMI_SERVICE_CRN }}
        run: |
          if [ -z "$QRMI_RESOURCE" ] || [ -z "$IBM_TOKEN" ] || [ -z "$QRMI_SERVICE_CRN" ]; then
            echo "no QRMI credentials configured (need QRMI_RESOURCE, IBM_TOKEN, QRMI_SERVICE_CRN); skipping live certification"
            exit 0
          fi
          # QRMI's convention: every variable is prefixed with the
          # resource id (first-contact finding, 2026-07-19).
          RID="${QRMI_RESOURCE%%=*}"
          {
            # qrmi appends /v1/... itself; a versioned base 404s everything
            echo "${RID}_QRMI_IBM_QRS_ENDPOINT=https://quantum.cloud.ibm.com/api"
            echo "${RID}_QRMI_IBM_QRS_IAM_ENDPOINT=https://iam.cloud.ibm.com"
            echo "${RID}_QRMI_IBM_QRS_IAM_APIKEY=$IBM_TOKEN"
            echo "${RID}_QRMI_IBM_QRS_SERVICE_CRN=$QRMI_SERVICE_CRN"
          } > adapters/qrmi/.env
          go build -o bin/rabi-conformance ./cmd/rabi-conformance
          # Pre-build the env so startup time is uv-resolution-free, keep
          # the adapter's log (it was /dev/null'd once; never again).
          (cd adapters/qrmi && uv sync --extra qrmi)
          (cd adapters/qrmi && exec uv run --extra qrmi rabi-adapter-qrmi \
            --resource "$QRMI_RESOURCE" --listen 127.0.0.1:50053) > bin/qrmi-adapter.log 2>&1 &
          ADAPTER_PID=$!
          for i in $(seq 1 120); do
            if python3 -c "import socket; socket.create_connection(('127.0.0.1', 50053), 1).close()" 2>/dev/null; then
              break
            fi
            if ! kill -0 "$ADAPTER_PID" 2>/dev/null; then
              echo "adapter exited during startup:"; cat bin/qrmi-adapter.log
              # QRMI's IBMQiskitRuntimeService type uses IBM Direct Access
              # (/core-fast). The Open plan lacks that entitlement, so
              # acquire() 404s — an environmental skip, not a code failure
              # (docs/decisions.md D-048). A real conformance bug fails
              # later, in rabi-conformance, and stays red.
              if grep -q "404 Not Found" bin/qrmi-adapter.log; then
                echo "::warning::QRMI live entitlement unavailable on this plan (Direct Access required); skipping live certification"
                exit 0
              fi
              exit 1
            fi
            sleep 2
          done
          bin/rabi-conformance run --target 127.0.0.1:50053 --out bin/conformance/qrmi-live \
            --task-timeout 20m --note "live QRMI vs IBM Qiskit Runtime (open plan; real queue times)" \
            || { echo "--- adapter log ---"; tail -50 bin/qrmi-adapter.log; exit 1; }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qrmi-live-report
          path: |
            bin/conformance/qrmi-live/
            bin/qrmi-adapter.log
          if-no-files-found: ignore
