# SPDX-License-Identifier: Apache-2.0
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint
        run: buf lint
      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          buf breaking --against '.git#ref=origin/main'
      - name: SPDX headers
        run: ./hack/check-spdx.sh
      - uses: astral-sh/setup-uv@v5
      - name: install codegen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0
      - name: codegen matches committed
        run: make gen-check
      - name: ruff (adapters)
        run: |
          (cd adapters/aer && uv run --extra dev ruff check .)
          (cd adapters/ibm && uv run --extra dev ruff check .)
          (cd adapters/qrmi && uv run --extra dev ruff check .)
          (cd adapters/qdmi && uv run --extra dev ruff check .)
          (cd adapters/iqm && uv run --extra dev ruff check .)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: astral-sh/setup-uv@v5
      # -p 1: parallel packages each run a Postgres testcontainer (and the
      # conformance package spawns the Python Aer adapter); together they
      # OOM-kill postmasters on 7GB runners. One package at a time.
      - name: go test (unit + component + adapter conformance)
        run: go test -p 1 ./...
      - name: coverage floors
        run: ./hack/coverage-check.sh

  golden-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: golden changes require the golden-change label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- \
            'internal/scheduler/testdata/golden/*.golden.json' | wc -l)
          if [ "$changed" -gt 0 ] && ! echo "$LABELS" | grep -q 'golden-change'; then
            echo "::error::golden placement files changed without the 'golden-change' label (T&V plan rule 5)"
            exit 1
          fi

  adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: pytest (Aer adapter — physics, idempotency, taxonomy)
        run: cd adapters/aer && uv run --extra dev pytest -q
      - name: pytest (QRMI adapter — cassette lifecycle, taxonomy, mapping)
        run: cd adapters/qrmi && uv run --extra dev pytest -q
      - name: pytest (QDMI adapter — C ABI binding vs compiled mock)
        run: cd adapters/qdmi && uv run --extra dev pytest -q
      - name: pytest (IQM adapter — cassette lifecycle)
        run: cd adapters/iqm && uv run --extra dev pytest -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: compose up
        run: make compose-up
      - name: smoke (M0 — transport + auth over gRPC+REST)
        run: ./hack/smoke-m0.sh
      - name: smoke (M1 — job lifecycle via qctl)
        run: ./hack/smoke-m1.sh
      - name: smoke (M2 — Bell job end-to-end with usage)
        run: ./hack/smoke-m2.sh
      - name: compose logs (on failure)
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs
      - name: compose down
        if: always()
        run: make compose-down

  conformance-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: astral-sh/setup-uv@v5
      - name: certify in-tree adapters (aer replay + ibm fake)
        run: ./hack/conformance-report.sh bin/conformance
      - uses: actions/upload-artifact@v4
        with:
          name: conformance-reports
          path: bin/conformance/
          if-no-files-found: error
