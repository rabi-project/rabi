# SPDX-License-Identifier: Apache-2.0
#
# Release CI (M12): on version tags — full test gate is the pushed commit's
# ci run; this workflow adds the CVE gate (no HIGH/CRITICAL), builds
# artifacts, and attaches the conformance reports.
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cve-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: govulncheck (Go, reachable call graph)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: trivy (filesystem, HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # Performance regression gate (P2.M2): a breached load or soak threshold
  # blocks the release tag. Runs the harness at a solid-but-bounded size (the
  # weekly/monthly jobs run the full sizes); testcontainers supplies Postgres.
  perf-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RABI_STORM_JOBS: "8000"
      RABI_STORM_TARGETS: "80"
      RABI_SOAK_SECONDS: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: storm + soak thresholds
        run: go test ./internal/loadtest/ -run 'TestStorm|TestSoak' -count=1 -v

  artifacts:
    needs: [cve-gate, perf-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: astral-sh/setup-uv@v5
      - name: build cross-platform binaries + checksums
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          # qctl is the client users install (kubectl-style); rabi and
          # rabi-conformance ship too for operators.
          for OSARCH in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${OSARCH%/*}"; GOARCH="${OSARCH#*/}"
            for BIN in qctl rabi rabi-conformance; do
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
                -ldflags "-X main.version=$VERSION" \
                -o "dist/${BIN}-${GOOS}-${GOARCH}" "./cmd/$BIN"
            done
          done
          ( cd dist && sha256sum * > SHA256SUMS )
      - name: conformance reports (all in-tree adapters)
        run: ./hack/conformance-report.sh dist/conformance
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/qctl-*
            dist/rabi-*
            dist/rabi-conformance-*
            dist/SHA256SUMS
          generate_release_notes: true

  homebrew:
    needs: artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: update the Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi
          git clone -q "https://x-access-token:${TAP_TOKEN}@github.com/rabi-project/homebrew-tap" tap
          mkdir -p tap/Formula
          ./packaging/render-formula.sh "${GITHUB_REF_NAME}" > tap/Formula/qctl.rb
          cd tap
          git -c user.email=ci@rabi.dev -c user.name="rabi-release" commit -aqm "qctl ${GITHUB_REF_NAME#v}" \
            && git push -q && echo "tap updated to ${GITHUB_REF_NAME}" || echo "no change"
