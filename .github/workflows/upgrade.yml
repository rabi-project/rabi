# SPDX-License-Identifier: Apache-2.0
# Upgrade & migration hardening (phase2-build-plan.md P2.M3). Three guarantees,
# all run against a real Postgres (testcontainers):
#   - migration matrix: every released tag's golden database migrates forward to
#     the current schema with its data intact;
#   - upgrade rehearsal: rolling the control plane under live load keeps in-flight
#     jobs (zero lost) with API unavailability under 30s;
#   - rollback safety: the schema stays additive, so the N-1 binary runs against
#     the N schema.
# Weekly, plus on any PR that touches migrations, the store, the dispatcher, or
# the goldens.
name: upgrade

on:
  schedule:
    - cron: "41 4 * * 3" # Wednesdays 04:41 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "internal/store/migrations/**"
      - "internal/store/**"
      - "internal/dispatch/**"
      - "internal/upgrade/**"
      - ".github/workflows/upgrade.yml"

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: migration matrix + upgrade rehearsal + rollback safety
        run: go test ./internal/upgrade/ -count=1 -v
