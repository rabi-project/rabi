# SPDX-License-Identifier: Apache-2.0
#
# Publishes the two buildable container images (control plane + Aer replay
# adapter) to GitHub Container Registry so deployments — fleet-0 especially —
# PULL amd64 images instead of building on the box. Public repo → public
# packages → no pull auth needed.
name: images
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: rabi-project

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      matrix:
        include:
          - name: rabi
            dockerfile: Dockerfile
          - name: rabi-adapter-aer
            dockerfile: adapters/aer/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: tags
        id: meta
        run: |
          SHA="g$(git rev-parse --short HEAD)"
          IMG="${REGISTRY}/${OWNER}/${{ matrix.name }}"
          TAGS="${IMG}:latest,${IMG}:${SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then TAGS="${TAGS},${IMG}:${GITHUB_REF_NAME}"; fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
